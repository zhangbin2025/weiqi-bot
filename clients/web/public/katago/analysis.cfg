# KataGo Analysis Config for Android App
# Based on KataGo 1.16.5 official analysis_example.cfg
# 精简配置，适配手机环境

# ========== 日志 ==========
logSearchInfo = false

# ========== 警告 ==========
# 禁用未使用字段的警告
warnUnusedFields = false

# ========== 分析输出 ==========
analysisPVLen = 15
reportAnalysisWinratesAs = BLACK

# ========== 搜索参数 ==========
# 手机环境：较少的分析线程，较多的搜索线程
numAnalysisThreads = 1
numSearchThreadsPerAnalysisThread = 4

# 神经网络缓存（根据手机内存调整）
nnCacheSizePowerOfTwo = 19
nnMutexPoolSizePowerOfTwo = 17
nnRandomize = true

# 最大访问次数（可通过查询参数覆盖）
maxVisits = 200

# 根节点噪声（分析模式建议 0.04，对弈模式建议 0.0）
wideRootNoise = 0.04

# ========== OpenCL GPU 设置 ==========
# Android 使用 OpenCL 后端
nnMaxBatchSize = 1

# OpenCL Tuning 缓存（避免每次启动都重新 tuning）
tuningCacheSeconds = 86400  # 缓存 24 小时

# FP16 设置（auto 表示自动检测，某些 OpenCL 驱动可能不支持）
openclUseFP16 = false

# ========== 其他行为 ==========
# 搜索对称性剪枝
rootSymmetryPruning = true

# 保守停一手（避免过早停手）
conservativePass = true

# 忽略历史记录（分析模式建议 true，避免历史着法影响）
ignorePreRootHistory = true
