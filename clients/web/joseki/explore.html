<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>定式探索 - 围棋智能助手</title>
  <link rel="stylesheet" href="../shared/shell.css">
  <style>
    /* explore 特有样式：内容区域 */
    .glass-content {
      padding: 0 12px 24px;
    }

    /* 标签页 */
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 16px;
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.3s ease;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .tab:hover { color: white; }
    .tab.active {
      background: white;
      color: #667eea;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 棋盘容器 */
    .joseki-board-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
      position: relative;
    }

    /* 棋盘容器内部的 board-container 需要明确宽度 */
    #board-container {
      width: 100%;
    }

    /* 统计数据 */
    .joseki-stats {
      display: flex;
      justify-content: space-around;
      padding: 16px 0;
      margin-bottom: 16px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 13px;
    }
    .joseki-stats .stat {
      text-align: center;
    }
    .joseki-stats .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: #667eea;
      display: block;
    }
    .joseki-stats .stat-value.positive { color: #4caf50; }
    .joseki-stats .stat-value.negative { color: #f44336; }
    .joseki-stats .stat-value.neutral { color: #666; }
    .joseki-stats .stat-value.clickable {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .joseki-stats .stat-label {
      font-size: 11px;
      color: #888;
    }

    /* 功能按钮 */
    .joseki-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .joseki-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .joseki-btn.secondary {
      background: #f0f0f0;
      color: #333;
    }
    .joseki-btn.favorited {
      background: #fff3e0;
      color: #ff9800;
    }
    .joseki-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* 收藏条目 */
    .joseki-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 8px 0;
    }
    .joseki-item {
      background: white;
      border-radius: 12px;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .joseki-item:active {
      transform: scale(0.95);
    }
    .fav-thumb-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 4px;
    }
    .fav-thumb-wrapper canvas {
      border-radius: 6px;
    }
    .item-moves {
      font-size: 12px;
      color: #666;
    }

    /* 脱先提示覆盖层 */
    .pass-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255, 152, 0, 0.9);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      pointer-events: none;
      z-index: 100;
    }

    /* 脱先标记首次提示 */
    .pass-hint {
      background: rgba(255, 152, 0, 0.95);
      color: white;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      white-space: nowrap;
    }
    .pass-hint::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 6px;
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 5px solid rgba(255, 152, 0, 0.95);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #888;
    }
    .empty-state-icon {
      font-size: 3em;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    /* 胜率详情弹窗 */
    .winrate-backdrop {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      opacity: 0; visibility: hidden;
      transition: all 0.3s ease;
      z-index: 999;
    }
    .winrate-backdrop.active { opacity: 1; visibility: visible; }
    .winrate-sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: white;
      border-radius: 16px 16px 0 0;
      padding: 16px 20px 24px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 1000;
      max-width: 600px;
      margin: 0 auto;
      pointer-events: none;
    }
    .winrate-sheet.active { transform: translateY(0); pointer-events: auto; }
    .winrate-sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    @media (min-width: 768px) {
      .winrate-sheet {
        left: 50%;
        right: auto;
        top: 50%;
        bottom: auto;
        transform: translate(-50%, -40%) scale(0.9);
        opacity: 0;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        max-height: 90vh;
        overflow-y: auto;
      }
      .winrate-sheet.active {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }
    .winrate-title {
      font-size: 1.1em;
      font-weight: 600;
      color: #333;
    }
    .winrate-close-btn {
      width: 32px; height: 32px;
      border: none; background: transparent;
      border-radius: 50%; cursor: pointer;
      font-size: 1em; color: #666;
    }
    .winrate-close-btn:hover { background: #e0e0e0; }
    .winrate-detail-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.95em;
    }
    .winrate-detail-label { color: #666; }
    .winrate-detail-value { font-weight: 500; }
    .winrate-bar {
      height: 24px;
      border-radius: 12px;
      overflow: hidden;
      background: #f5f5f5;
      margin: 12px 0;
      display: flex;
    }
    .winrate-bar-positive { background: #4caf50; }
    .winrate-bar-neutral { background: #bdbdbd; }
    .winrate-bar-negative { background: #f44336; }
    .winrate-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.8em;
      color: #666;
      margin-top: 4px;
    }
    .winrate-hint {
      font-size: 0.85em;
      color: #999;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    /* 收藏列表增强 */
    .favorites-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .favorite-item {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      width: 100%;
      justify-content: flex-start;
    }
    .favorite-item:hover {
      transform: translateY(-2px);
    }
    .favorite-thumb {
      flex-shrink: 0;
    }
    .favorite-thumb canvas {
      border-radius: 8px;
    }
    .favorite-info {
      flex: 1;
      min-width: 0; /* 防止内容溢出 */
    }
    .favorite-moves {
      font-size: 1em;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }
    .favorite-time {
      font-size: 0.8em;
      color: #888;
    }
    .favorite-actions {
      display: flex;
      gap: 8px;
      margin-left: auto; /* 推到最右边 */
      align-self: flex-start; /* 靠顶部对齐 */
      padding-top: 2px; /* 微调对齐，和标题基线接近 */
    }
    .favorite-delete-btn {
      background: transparent;
      border: none;
      color: #999;
      cursor: pointer;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 1em;
      transition: all 0.2s;
      flex-shrink: 0; /* 防止被压缩 */
    }
    .favorite-delete-btn:hover {
      background: rgba(244, 67, 54, 0.1);
      color: #f44336;
    }

    /* 图标按钮 */
    .icon-btn {
      background: #f0f0f0;
      border: none;
      color: #666;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.2s;
      padding: 6px 12px;
      font-size: 0.85em;
    }
    .icon-btn:hover {
      background: #e0e0e0;
    }
/* 加载遮罩样式 */#loading-overlay {  position: fixed;  top: 0;  left: 0;  right: 0;  bottom: 0;  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);  z-index: 9999;  display: flex;  align-items: center;  justify-content: center;  transition: opacity 0.3s ease;}.loading-content {  text-align: center;  color: white;}.loading-spinner {  width: 60px;  height: 60px;  border: 4px solid rgba(255, 255, 255, 0.3);  border-top-color: white;  border-radius: 50%;  animation: spin 1s linear infinite;  margin: 0 auto 20px;}@keyframes spin {  to { transform: rotate(360deg); }}.loading-title {  font-size: 24px;  font-weight: bold;  margin-bottom: 12px;}.loading-status {  font-size: 14px;  opacity: 0.9;  margin-bottom: 20px;  min-height: 20px;}.loading-progress {  width: 200px;  height: 4px;  background: rgba(255, 255, 255, 0.3);  border-radius: 2px;  margin: 0 auto;  overflow: hidden;}.loading-progress-bar {  height: 100%;  background: white;  border-radius: 2px;  width: 0%;  transition: width 0.3s ease;}
  </style>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/favicon-180x180.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
</head>
<body>
  <div class="glass-container">
    <header class="glass-header">
      <h1 class="glass-title">🔍 定式探索</h1>
      <p class="glass-subtitle">交互式探索定式变化</p>
    </header>

    <div class="glass-content">

    <!-- 标签页 -->
    <div class="tabs">
      <div class="tab active" data-tab="explore">
        <span>🔍</span>
        <span>探索</span>
      </div>
      <div class="tab" data-tab="favorites">
        <span>⭐</span>
        <span>收藏</span>
      </div>
    </div>

    <!-- 探索内容 -->
    <div id="explore-content" class="tab-content active">
      <div class="card">
        <!-- 棋盘 -->
        <div class="joseki-board-wrapper">
          <div id="board-container"></div>
          <!-- 脱先提示覆盖层 -->
          <div id="pass-overlay" class="pass-overlay" style="display: none;">黑方脱先</div>
          <!-- 脱先标记首次提示 -->
          <div id="pass-hint" class="pass-hint" style="display: none;">点击这里可以脱先 ↙</div>
        </div>

        <!-- 统计数据 -->
        <div class="joseki-stats">
          <div class="stat">
            <span class="stat-value" id="stat-moves">0</span>
            <span class="stat-label">手数</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-freq">-</span>
            <span class="stat-label">出现次数</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-prob">-</span>
            <span class="stat-label">出现概率</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-winrate">-</span>
            <span class="stat-label">胜率变化</span>
          </div>
        </div>

        <!-- 功能按钮 -->
        <div class="joseki-controls">
          <button class="joseki-btn" id="undo-btn" disabled title="撤销">↩</button>
          <button class="joseki-btn secondary" id="fav-btn" title="收藏" data-faved="false">☆</button>
          <button class="joseki-btn secondary" id="reset-btn" title="重置">⟳</button>
        </div>
      </div>
    </div>

    <!-- 收藏内容 -->
    <div id="favorites-content" class="tab-content">
      <div class="card">
        <h2>⭐ 收藏的定式</h2>
        <div id="favorites-list">
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <div>暂无收藏</div>
            <div style="font-size:0.85em;margin-top:8px;">探索定式时点击收藏按钮添加</div>
          </div>
        </div>
      </div>
    </div>

    <footer><p>围棋智能助手 &copy; 2026</p></footer>
  </div>

  <!-- 胜率详情弹窗 -->
  <div class="winrate-backdrop" id="winrate-backdrop"></div>
  <div class="winrate-sheet" id="winrate-sheet">
    <div class="winrate-sheet-header">
      <div class="winrate-title">胜率详情</div>
      <button class="winrate-close-btn" id="winrate-close-btn">✕</button>
    </div>
    <div id="winrate-content"></div>
  </div>

  </div>

  <!-- Bootstrap 管理的空容器 -->
  <div id="page-root" style="display:none;"></div>

  <script src="../shared/error-catch.js"></script>
  <script type="module" src="./explore.ts"></script>
</body>
</html>
