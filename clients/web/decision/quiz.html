<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>实战选点 - 围棋智能助手</title>
  <link rel="stylesheet" href="../shared/assets/css/ui.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
      touch-action: manipulation;
    }
    .container {
      background: white;
      width: 100%;
      max-width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    /* 页面标题栏（参考 replay） */
    .page-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }
    .page-header .header-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .page-header .page-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.2;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .page-header .page-subtitle {
      font-size: 12px;
      opacity: 0.85;
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 30px;
    }
    .page-header .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* 三点菜单按钮 */
    .menu-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 20px;
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .menu-btn:hover {
      background: rgba(255,255,255,0.25);
    }
    
    /* 下拉菜单 */
    .dropdown {
      position: relative;
    }
    .dropdown-menu {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      min-width: 180px;
      display: none;
      z-index: 1000;
      overflow: hidden;
    }
    .dropdown-menu.visible {
      display: block;
    }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      color: #333;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
    }
    .dropdown-item:hover {
      background: #f5f5f5;
    }
    .dropdown-divider {
      height: 1px;
      background: #e8e8e8;
      margin: 4px 0;
    }
    
    /* 棋子小图标 */
    .stone-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stone-dot.black {
      background: radial-gradient(circle at 30% 30%, #555, #000);
    }
    .stone-dot.white {
      background: radial-gradient(circle at 30% 30%, #fff, #ccc);
      border: 1px solid #ddd;
    }
    
    /* 旧的头部和棋手信息样式（保留用于兼容） */
    .header { text-align: center; margin-bottom: 2px; }
    .header h1 {
      font-size: 14px;
      color: #333;
      line-height: 1.3;
    }
    
    .player-info {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin: 2px 0 4px;
      font-size: 12px;
      color: #555;
    }
    .player-item { display: flex; align-items: center; gap: 4px; }
    .player-stone { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .player-stone.black { background: radial-gradient(circle at 30% 30%, #666, #000); }
    .player-stone.white { background: radial-gradient(circle at 30% 30%, #fff, #ccc); border: 1px solid #ddd; }
    .player-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
    
    /* 标签栏 */
    .tag-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 2px 0 4px;
      padding: 8px 4px;
    }
    .tag-left {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .tag-right {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #f0f0f0;
      font-size: 11px;
      color: #555;
    }
    .tag { 
      display: inline-flex; 
      align-items: center; 
      gap: 3px; 
      padding: 1px 6px; 
      border-radius: 6px; 
      font-size: 10px; 
      font-weight: bold; 
    }
    .tag-phase-layout { background: #4CAF50; color: white; }
    .tag-phase-middle { background: #2196F3; color: white; }
    .tag-phase-endgame { background: #FF9800; color: white; }
    .tag-level { color: white; }
    .tag-level[data-level="职业"] { background: #E57373; }
    .tag-level[data-level="高段"] { background: #FFB74D; }
    .tag-level[data-level="普通"] { background: #81C784; }
    .tag-blunder { background: #F44336; color: white; }
    .turn-dot { width: 10px; height: 10px; border-radius: 50%; }
    .turn-dot.black { background: radial-gradient(circle at 30% 30%, #666, #000); }
    .turn-dot.white { background: radial-gradient(circle at 30% 30%, #fff, #ccc); border: 1px solid #aaa; }
    
    /* 棋盘 */
    #board-root { display: flex; justify-content: center; margin: 2px 0; position: relative; width: 100%; padding: 0; }
    
    /* SVG图标按钮样式 */
    .icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #555;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .icon-btn:active:not(:disabled) {
      transform: scale(0.92);
      color: #333;
    }

    .icon-btn:hover:not(:disabled) {
      background: #f5f5f5;
    }
    
    /* 题号显示 */
    .problem-info {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      min-width: 50px;
      text-align: center;
    }
    
    /* 按钮 */
    .btn { 
      width: 32px; height: 32px; border: none; border-radius: 50%; cursor: pointer; 
      font-size: 14px; display: flex; align-items: center; justify-content: center; 
      transition: all 0.2s ease; background: #f0f0f0; color: #333; 
    }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(0.95); }
    .btn-primary { background: #667eea; color: white; }
    .btn-danger { background: #ff6b6b; color: white; }
    .btn-back { 
      background: #e0e0e0; 
      color: #333; 
    }
    
    /* 控制栏 */
    .controls-row { display: flex; align-items: center; justify-content: space-between; gap: 4px; margin: 6px 0; flex-wrap: nowrap; padding: 0 2px; }
    .controls-group { display: flex; align-items: center; gap: 6px; }
    .slider-container { width: 80px; min-width: 50px; max-width: 120px; display: flex; align-items: center; }
    
    /* PC端适配：滑条更宽 */
    @media (min-width: 768px) {
      .slider-container { width: 160px; max-width: 200px; }
    }
    #moveSlider { 
      width: 100% !important; 
      height: 4px !important;
      -webkit-appearance: none !important;
      appearance: none !important;
      background: #e0e0e0 !important;
      border-radius: 2px !important;
      outline: none !important;
    }
    #moveSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(102,126,234,0.4);
    }
    #moveSlider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(102,126,234,0.4);
    }
    .problem-info {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      min-width: 50px;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 36px;
    }
    .main-controls { gap: 12px; transition: gap 0.2s ease; flex: 0 0 auto; }
    .main-controls.expanded { gap: 6px; }
    .extra-buttons { display: none; align-items: center; gap: 6px; }
    .extra-buttons.visible { display: flex; }
    #moreBtn { background: #f0f0f0; transition: all 0.2s ease; }
    #moreBtn.active { background: #667eea; color: white; }
    .controls-divider { width: 1px; height: 18px; background: #ddd; margin: 0 2px; flex-shrink: 0; }
    
    /* 变化图模式 */
    .variation-mode .slider-container { display: none; }
    .variation-mode .controls-divider { display: none; }
    .variation-mode #moreBtn { display: none; }
    .variation-mode .extra-buttons { display: none; }
    .variation-mode #prevProblemBtn { display: none; }
    .variation-mode #nextProblemBtn { display: none; }
    .variation-mode .problem-info { display: none; }
    .variation-mode .main-controls { flex: 0; margin-left: 0; margin-right: 0; gap: 10px; justify-content: center; width: auto; }
    
    /* 试下模式 */
    .trial-mode .slider-container { display: none; }
    .trial-mode .controls-divider { display: none; }
    .trial-mode #moreBtn { display: none; }
    .trial-mode .extra-buttons { display: none; }
    .trial-mode #prevProblemBtn { display: none; }
    .trial-mode #nextProblemBtn { display: none; }
    .trial-mode .problem-info { display: none; }
    .trial-mode .main-controls { flex: 0; margin-left: 0; margin-right: 0; gap: 10px; justify-content: center; width: auto; }
    .trial-mode .result-card { display: none; }
    .trial-mode .legend { display: none; }
    
    /* 结果卡片 */
    .result-card {
      margin: 8px 4px;
      padding: 12px;
      background: #fafafa;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .result-card.hidden { display: none; }
    
    /* 结果标题 */
    .result-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    .result-status {
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .result-status.correct { color: #4CAF50; }
    .result-status.wrong { color: #F44336; }
    .result-status .icon { font-size: 16px; }
    
    /* 选项列表 */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }
    .option-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: white;
      border-radius: 8px;
      border: 2px solid transparent;
      transition: all 0.2s ease;
    }
    .option-item.correct {
      border-color: #4CAF50;
      background: rgba(76, 175, 80, 0.08);
    }
    .option-item.wrong {
      border-color: #F44336;
      background: rgba(244, 67, 54, 0.08);
    }
    .option-item.selected {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.08);
    }
    .option-item:hover {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.12);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
    }
    .option-letter {
      font-size: 16px;
      font-weight: bold;
      color: #667eea;
      width: 28px;
      text-align: center;
    }
    .option-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-left: 8px;
    }
    .option-label {
      font-size: 11px;
      color: #888;
    }
    .option-label.practical { color: #FF9800; font-weight: bold; }
    .option-label.correct { color: #4CAF50; font-weight: bold; }
    .option-winrate {
      font-size: 12px;
      color: #333;
      font-weight: 500;
    }
    .option-indicator {
      font-size: 14px;
      margin-left: 8px;
    }
    
    /* 底部提示 */
    .result-hint {
      text-align: right;
      font-size: 13px;
      color: #666;
      white-space: nowrap;
      font-weight: 500;
      padding: 4px 8px;
      background: rgba(102, 126, 234, 0.08);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .result-hint:hover {
      background: rgba(102, 126, 234, 0.15);
      color: #667eea;
    }
    
    /* 底部导航 */
    .legend { 
      display: flex; justify-content: center; gap: 20px; 
      margin-top: 4px; padding-top: 4px; border-top: 1px solid #eee; 
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
    .stone-black, .stone-white { width: 14px; height: 14px; border-radius: 50%; }
    .stone-black { background: radial-gradient(circle at 30% 30%, #666, #000); }
    .stone-white { background: radial-gradient(circle at 30% 30%, #fff, #ccc); border: 1px solid #ddd; }
    
    .problem-nav { display: flex; align-items: center; justify-content: center; gap: 6px; }
    .problem-nav .progress-text { font-size: 12px; color: #666; font-weight: bold; }
    .problem-nav .btn-text { 
      padding: 4px 10px; font-size: 12px; border-radius: 6px; 
      background: #f0f0f0; color: #333; border: none; cursor: pointer; 
    }
    .problem-nav .btn-text:hover { background: #e0e0e0; }
    .problem-nav .btn-text:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .hidden { display: none !important; }
    
    @media (min-width: 600px) {
      body { padding: 8px; }
      .container { max-width: 500px; padding: 20px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    }
  </style>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/favicon-180x180.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
</head>
<body>
  <div class="container">
    <!-- 渐变标题栏（只有一层） -->
    <header class="page-header">
      <div class="header-left">
        <div class="page-title" id="playerTitle">
          <span class="stone-dot black"></span><span id="blackName">黑棋</span>
          <span style="opacity:0.6">vs</span>
          <span class="stone-dot white"></span><span id="whiteName">白棋</span>
        </div>
      </div>
      <div class="header-right">
        <div class="dropdown">
          <button class="menu-btn" id="menuBtn" title="菜单">⋮</button>
          <div class="dropdown-menu" id="dropdownMenu">
            <button class="dropdown-item" id="soundMenuItem">✓ 落子音效</button>
            <button class="dropdown-item" id="downloadMenuItem">📥 下载SGF</button>
          </div>
        </div>
      </div>
    </header>
    
    <!-- 标签栏 -->
    <div class="tag-bar">
      <div class="tag-left" id="tagLeft">
        <span class="tag tag-phase-middle" id="phaseTag">中盘</span>
        <span class="tag tag-level" id="levelTag" data-level="普通">普通</span>
        <span class="tag tag-blunder">恶手题</span>
      </div>
      <div class="tag-right" id="turnTag">
        <span class="turn-dot black" id="turnDot"></span>
        <span id="turnText">黑下</span>
      </div>
    </div>

    <!-- 棋盘 -->
    <div id="board-root"></div>

    <!-- 控制栏 -->
    <div class="controls-row">
      <!-- 左组：棋局控制 -->
      <div class="controls-group">
        <div class="slider-container">
          <input type="range" id="moveSlider" min="0" max="0" value="0">
        </div>
      </div>
      <div class="controls-group main-controls" id="mainControlsGroup" style="flex: 0 0 auto; margin-left: 16px;">
        <button class="icon-btn" id="prevBtn" title="上一手">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="icon-btn" id="nextBtn" title="下一手">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <div class="controls-divider"></div>
        <button class="icon-btn" id="prevProblemBtn" title="上一题">
          <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
        <span class="problem-info" id="progressText" style="font-size: 13px; font-weight: 600; color: #333; min-width: 40px; text-align: center;">1 / 1</span>
        <button class="icon-btn" id="nextProblemBtn" title="下一题">
          <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <button class="icon-btn" id="backToParentBtn" title="返回题目" style="display: none;">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- 结果卡片 -->
    <div class="result-card hidden" id="resultCard">
      <div class="result-title">
        <div class="result-status" id="resultStatus">
          <span class="icon" id="resultIcon">✓</span>
          <span id="resultText">答对了</span>
        </div>
        <div class="result-hint">点击选点展开变化图</div>
      </div>
      <div class="options-list" id="optionsList">
        <!-- 选项会在这里动态生成 -->
      </div>
    </div>

    <!-- 底部导航（已隐藏，题号已移到功能栏） -->
    <div class="legend" style="display: none;">
      <div class="problem-nav">
        <span class="progress-text" id="progressText">1 / 1</span>
        <button class="btn-text" id="prevProblemBtn">上一题</button>
        <button class="btn-text" id="nextProblemBtn">下一题</button>
      </div>
    </div>
  </div>

  <div id="page-root" style="display:none;"></div>
  <script src="../shared/error-catch.js"></script>
  <script type="module" src="./quiz.ts"></script>
  <script>
    // 菜单切换
    const menuBtn = document.getElementById('menuBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    
    menuBtn?.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu?.classList.toggle('visible');
    });

    // 点击其他地方关闭菜单
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown')) {
        dropdownMenu?.classList.remove('visible');
      }
    });

    // 音效开关菜单项
    let soundEnabled = true;
    const soundMenuItem = document.getElementById('soundMenuItem');
    soundMenuItem?.addEventListener('click', (e) => {
      e.stopPropagation();
      soundEnabled = !soundEnabled;
      soundMenuItem.textContent = soundEnabled ? '✓ 落子音效' : '✗ 落子音效';
      dropdownMenu?.classList.remove('visible');
      // 通知 TypeScript 代码
      window.dispatchEvent(new CustomEvent('toggleSound', { detail: soundEnabled }));
    });

    // 下载SGF菜单项
    const downloadMenuItem = document.getElementById('downloadMenuItem');
    downloadMenuItem?.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu?.classList.remove('visible');
      window.dispatchEvent(new CustomEvent('downloadSGF'));
    });
    
    // 原有的 moreBtn 展开/收起逻辑（保留，以防有其他地方用到）
    let isExpanded = false;
    document.getElementById('moreBtn')?.addEventListener('click', function() {
      isExpanded = !isExpanded;
      const extraButtons = document.getElementById('extraButtons');
      const mainControls = document.getElementById('mainControlsGroup');
      const moreBtn = document.getElementById('moreBtn');
      if (isExpanded) {
        extraButtons?.classList.add('visible');
        mainControls?.classList.add('expanded');
        moreBtn?.classList.add('active');
      } else {
        extraButtons?.classList.remove('visible');
        mainControls?.classList.remove('expanded');
        moreBtn?.classList.remove('active');
      }
    });
  </script>
</body>
</html>
