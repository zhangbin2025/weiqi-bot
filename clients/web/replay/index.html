<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>棋谱查看</title>
  <link rel="stylesheet" href="../shared/assets/css/ui.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
      touch-action: manipulation;
    }

    /* ---- 页面容器 ---- */
    .container {
      background: white;
      width: 100%;
      max-width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ---- 渐变标题栏 ---- */
    .page-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .page-header .header-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .page-header .page-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.2;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .page-header .page-subtitle {
      font-size: 12px;
      opacity: 0.85;
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 18px;
    }

    .page-header .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 三点菜单按钮 */
    .menu-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 20px;
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .menu-btn:hover {
      background: rgba(255,255,255,0.25);
    }

    /* 下拉菜单 */
    .dropdown {
      position: relative;
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      min-width: 180px;
      display: none;
      z-index: 1000;
      overflow: hidden;
    }

    .dropdown-menu.visible {
      display: block;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      color: #333;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
    }

    .dropdown-item:hover {
      background: #f5f5f5;
    }

    .dropdown-divider {
      height: 1px;
      background: #e8e8e8;
      margin: 4px 0;
    }

    /* 棋子小图标 */
    .stone-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stone-dot.black {
      background: radial-gradient(circle at 30% 30%, #555, #000);
    }

    .stone-dot.white {
      background: radial-gradient(circle at 30% 30%, #fff, #ccc);
      border: 1px solid #ddd;
    }

    /* 原有样式保留 */
    .header { text-align: center; margin-bottom: 8px; }
    .header h1 { font-size: 15px; color: #333; margin-bottom: 2px; line-height: 1.2; }
    .header .info { color: #666; font-size: 11px; line-height: 1.3; }
    
    #page-root { 
      display: flex; 
      justify-content: center; 
      margin: 10px 0; 
      position: relative; 
      width: 100%; 
    }
    
    /* SVG图标按钮样式 */
    .icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #555;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .icon-btn:active:not(:disabled) {
      transform: scale(0.92);
      color: #333;
    }

    .icon-btn:hover:not(:disabled) {
      background: #f5f5f5;
    }

    .icon-btn.primary {
      color: #667eea;
    }

    .icon-btn.primary:hover:not(:disabled) {
      background: #f0f4ff;
    }

    .icon-btn.danger {
      color: #ff6b6b;
    }

    .icon-btn.danger:hover:not(:disabled) {
      background: #fff5f5;
    }
    
    .btn { width: 44px; height: 44px; border: none; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; background: #f0f0f0; color: #333; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(0.95); }
    .btn-danger { background: #ff6b6b; color: white; }
    
    .status { text-align: center; margin: 10px 0; }
    .move-info { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 4px; }
    .captured-info { font-size: 14px; color: #888; }
    
    .legend { display: flex; justify-content: center; gap: 20px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #555; }
    .stone-black, .stone-white { width: 20px; height: 20px; border-radius: 50%; }
    .stone-black { background: radial-gradient(circle at 30% 30%, #666, #000); }
    .stone-white { background: radial-gradient(circle at 30% 30%, #fff, #ccc); border: 1px solid #ddd; }
    
    .variation-panel { margin: 8px 0; padding: 10px; background: #f8f9fa; border-radius: 8px; display: none; }
    .variation-panel.visible { display: block; }
    .variation-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .btn-variation { width: auto; min-width: 60px; padding: 6px 10px; height: 32px; font-size: 13px; border-radius: 6px; background: #667eea; color: white; white-space: nowrap; display: flex; align-items: center; gap: 6px; border: none; cursor: pointer; }
    .stone-icon { width: 16px; height: 16px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .stone-icon.black { background: radial-gradient(circle at 30% 30%, #666, #000); }
    .stone-icon.white { background: radial-gradient(circle at 30% 30%, #fff, #ccc); border: 1px solid #999; }
    
    .controls-row { display: flex; align-items: center; justify-content: space-between; gap: 4px; margin: 6px 0; flex-wrap: nowrap; padding: 0 2px; }
    .controls-group { display: flex; align-items: center; gap: 8px; }
    .slider-container { width: 120px; min-width: 60px; max-width: 160px; display: flex; align-items: center; }
    
    /* PC端适配：滑条更宽 */
    @media (min-width: 768px) {
      .slider-container { width: 200px; max-width: 240px; }
    }
    #moveSlider { 
      width: 100%; 
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: #e0e0e0;
      border-radius: 3px;
      outline: none;
    }
    #moveSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(102,126,234,0.4);
    }
    #moveSlider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(102,126,234,0.4);
    }
    .main-controls { gap: 24px; transition: gap 0.2s ease; }
    .main-controls.expanded { gap: 8px; }
    .extra-buttons { display: none; align-items: center; gap: 8px; }
    .extra-buttons.visible { display: flex; }
    #moreBtn { background: #f0f0f0; transition: all 0.2s ease; }
    #moreBtn.active { background: #667eea; color: white; }
    .controls-divider { width: 1px; height: 20px; background: #ddd; margin: 0 3px; flex-shrink: 0; }
    
    .trial-panel {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 16px;
      background: #f0f4ff;
      border-top: 1px solid #e8e8e8;
      flex-shrink: 0;
    }

    .trial-panel.visible {
      display: flex;
    }
    
    /* 分支模式样式 */
    .variation-mode .controls-row { justify-content: center; }
    .variation-mode .slider-container { display: none; }
    .variation-mode .controls-divider { display: none; }
    .variation-mode .main-controls { flex: 0; margin-left: 0; margin-right: 0; gap: 12px; justify-content: center; width: auto; }
    
    /* 试下模式样式 */
    .trial-mode .controls-row { display: none; }
    .trial-mode .variation-panel { display: none; }
    .trial-mode .legend { display: none; }
    .trial-mode .status { display: none; }
    
    @media (min-width: 600px) { 
      body { padding: 8px; } 
      .container { max-width: 500px; padding: 20px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); } 
      .header h1 { font-size: 20px; } 
      .controls-group { gap: 12px; }
    }
  </style>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/favicon-180x180.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
</head>
<body>
  <div class="container">
    <!-- 渐变标题栏 -->
    <header class="page-header">
      <div class="header-left">
        <div class="page-title" id="playerTitle">
          <span class="stone-dot black"></span><span id="blackName">黑棋</span>
          <span style="opacity:0.6">vs</span>
          <span class="stone-dot white"></span><span id="whiteName">白棋</span>
        </div>
        <div class="page-subtitle" id="resultInfo" style="display:none;">
          <span id="resultText"></span>
        </div>
      </div>
      <div class="header-right">
        <div class="dropdown">
          <button class="menu-btn" id="menuBtn" title="菜单">⋮</button>
          <div class="dropdown-menu" id="dropdownMenu">
            <button class="dropdown-item" id="soundMenuItem">🔊 音效开关</button>
            <button class="dropdown-item" id="numMenuItem">⭕ 显示手数</button>
            <button class="dropdown-item" id="playMenuItem">▶️ 自动播放</button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" id="aiReviewMenuItem">🤖 AI复盘</button>
            <button class="dropdown-item" id="downloadMenuItem">📥 下载SGF</button>
          </div>
        </div>
      </div>
    </header>
    
    <div id="page-root">
      <!-- 棋盘由 WebBoard 组件渲染 -->
    </div>
    
    <!-- 控制栏 -->
    <div class="controls-row">
      <div class="controls-group">
        <div class="slider-container">
          <input type="range" id="moveSlider" min="0" max="999" value="0">
        </div>
      </div>
      <div class="controls-group main-controls" id="mainControlsGroup" style="flex: 0 0 auto; margin-left: 16px;">
        <button class="icon-btn" id="backToParentBtn" title="返回主分支" style="display: none;">
          <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <button class="icon-btn" id="prevBtn" title="上一手">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="icon-btn" id="nextBtn" title="下一手">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <!-- 第几手信息 -->
        <div class="move-info" id="moveInfo" style="margin-left: 8px; font-size: 14px; color: #333; white-space: nowrap; min-width: 60px;">第 0 手</div>
      </div>
    </div>
    
    <!-- 试下面板 -->
    <div class="trial-panel" id="trialPanel">
      <button class="icon-btn" id="trialPrevBtn" title="上一步">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="icon-btn" id="exitTrialBtn" title="退出试下">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="icon-btn" id="trialNextBtn" title="下一步">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    
    <!-- 变化图面板 -->
    <div class="variation-panel" id="variationPanel">
      <div class="variation-list" id="variationList"></div>
    </div>
    
    <!-- 对局信息 -->
    <div class="game-info-bar">
      <div id="gameTitle" style="text-align: center; font-size: 13px; color: #666;">未命名棋谱</div>
    </div>
  </div>
  
  <script type="module" src="./index.ts"></script>
  <script>
    // 菜单切换
    const menuBtn = document.getElementById('menuBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    
    menuBtn?.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu?.classList.toggle('visible');
    });

    // 点击其他地方关闭菜单
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown')) {
        dropdownMenu?.classList.remove('visible');
      }
    });

    // 音效开关 - 只发送事件，让 TypeScript 控制状态
    const soundMenuItem = document.getElementById('soundMenuItem');
    soundMenuItem?.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu?.classList.remove('visible');
      // 通知 TypeScript 代码（toggle 逻辑在 TypeScript 中处理）
      window.dispatchEvent(new CustomEvent('toggleSound'));
    });

    // 手数显示 - 只发送事件，让 TypeScript 控制状态
    const numMenuItem = document.getElementById('numMenuItem');
    numMenuItem?.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu?.classList.remove('visible');
      // 通知 TypeScript 代码（toggle 逻辑在 TypeScript 中处理）
      window.dispatchEvent(new CustomEvent('toggleMoveNumbers'));
    });

    // 自动播放 - 只发送事件，由 TypeScript 处理
    // 不再在 HTML 中维护 isPlaying 状态
    const playMenuItem = document.getElementById('playMenuItem');
    playMenuItem?.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu?.classList.remove('visible');
      // 通知 TypeScript 代码
      window.dispatchEvent(new CustomEvent('togglePlay'));
    });
    
    // 下载SGF（由 TypeScript 处理，通过 downloadSGF 事件）
    const downloadMenuItem = document.getElementById('downloadMenuItem');
    downloadMenuItem?.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu?.classList.remove('visible');
      // 通知 TypeScript 代码
      window.dispatchEvent(new CustomEvent('downloadSGF'));
    });
    
    // AI复盘
    const aiReviewMenuItem = document.getElementById('aiReviewMenuItem');
    
    // 获取 archiveId 参数
    const urlParams = new URLSearchParams(window.location.search);
    const archiveId = urlParams.get('archiveId');
    
    // 如果没有 archiveId，禁用菜单项
    if (!archiveId) {
      if (aiReviewMenuItem) {
        aiReviewMenuItem.disabled = true;
        aiReviewMenuItem.style.opacity = '0.5';
        aiReviewMenuItem.style.cursor = 'not-allowed';
      }
    } else {
      // 有 archiveId，绑定点击事件
      aiReviewMenuItem?.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdownMenu?.classList.remove('visible');
        
        // 判断环境（Web 或 App）
        const isApp = typeof navigator !== 'undefined' && navigator.userAgent.includes('WeiqiApp');
        
        if (isApp) {
          // App 环境：跳转到 assistant 页面，传递 text 参数（包含 archiveId）
          const assistantUrl = `../assistant/index.html?text=${encodeURIComponent('复盘棋谱 ' + archiveId)}`;
          window.location.href = assistantUrl;
        } else {
          // Web 环境：跳转到 review 页面
          const reviewUrl = `../review/index.html?archiveId=${archiveId}`;
          window.location.href = reviewUrl;
        }
      });
    }
    
    // 监听胜负信息更新
    window.addEventListener('gameInfoUpdated', (e) => {
      const data = e.detail;
      
      // 更新标题栏的棋手名称
      const blackNameEl = document.getElementById('blackName');
      const whiteNameEl = document.getElementById('whiteName');
      if (blackNameEl && data.black) {
        blackNameEl.textContent = data.black;
      }
      if (whiteNameEl && data.white) {
        whiteNameEl.textContent = data.white;
      }
      
      // 更新胜负信息
      const resultInfoEl = document.getElementById('resultInfo');
      const resultTextEl = document.getElementById('resultText');
      if (resultInfoEl && resultTextEl) {
        if (data.result) {
          resultTextEl.textContent = data.result;
          resultInfoEl.style.display = 'flex';
        } else {
          resultInfoEl.style.display = 'none';
        }
      }
      
      // 更新底部的对局名称
      const gameTitleEl = document.getElementById('gameTitle');
      if (gameTitleEl) {
        gameTitleEl.textContent = data.game_name || '未命名棋谱';
      }
    });
  </script>
</body>
</html>
