<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>真人对弈</title>
  <link rel="stylesheet" href="../shared/assets/css/ui.css">
  <link rel="stylesheet" href="./styles/hh.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/favicon-180x180.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
</head>
<body>
  <div class="container">
    <!-- 标题栏 -->
    <div class="page-header">
      <div class="header-left">
        <span class="page-title">真人对弈</span>
      </div>
      <div class="header-right">
        <!-- 三点菜单按钮 -->
        <div class="dropdown">
          <button class="menu-btn" id="menuBtn">⋮</button>
          <div class="dropdown-menu" id="dropdownMenu">
            <button class="dropdown-item" id="undoMenuItem" disabled>
              <svg viewBox="0 0 24 24">
                <path d="M9 14L4 9l5-5"/>
                <path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/>
              </svg>
              悔棋
            </button>
            <button class="dropdown-item" id="passMenuItem" disabled>
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke-dasharray="4 2" fill="none" stroke-width="2"/>
              </svg>
              停一手
            </button>
            <button class="dropdown-item" id="countMenuItem" disabled>
              <svg viewBox="0 0 24 24">
                <line x1="4" y1="8" x2="20" y2="8" stroke-width="2"/>
                <line x1="4" y1="12" x2="20" y2="12" stroke-width="2"/>
                <line x1="4" y1="16" x2="20" y2="16" stroke-width="2"/>
              </svg>
              数子
            </button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item danger" id="resignMenuItem" disabled>
              <svg viewBox="0 0 24 24">
                <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
                <line x1="12" y1="2" x2="12" y2="12"/>
              </svg>
              认输
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 玩家栏 -->
    <div class="players-bar">
      <div class="player-box" id="blackBox">
        <div class="stone black"></div>
        <div class="player-info">
          <span class="player-name" id="blackName">黑方</span>
          <span class="player-time" id="blackTime">30:00</span>
        </div>
      </div>
      <!-- 手数和提子数信息 -->
      <div class="game-stats">
        <div class="stat-item">手数: <span id="moveCount">0</span></div>
        <div class="stat-item">提子: <span id="blackCaptures">0</span>/<span id="whiteCaptures">0</span></div>
      </div>
      <div class="player-box right" id="whiteBox">
        <div class="stone white"></div>
        <div class="player-info">
          <span class="player-name" id="whiteName">白方</span>
          <span class="player-time" id="whiteTime">30:00</span>
        </div>
      </div>
    </div>
    
    <!-- 棋盘 -->
    <div class="board-container">
      <div id="page-root"></div>
    </div>
    
    <!-- 控制栏 -->
    <div class="control-bar">
      <button class="btn primary" id="confirmBtn" title="确认落子" style="display:none;">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
    </div>
    
    <!-- 隐藏的原有按钮（用于状态同步）-->
    <div style="display: none;">
      <button id="undoBtn" disabled></button>
      <button id="passBtn" disabled></button>
      <button id="countBtn" disabled></button>
      <button id="resignBtn" disabled></button>
    </div>
    
    <!-- 状态栏 -->
    <div class="status-bar" id="gameStatus">点击下方按钮开始</div>
  </div>
  
  <!-- 弹框容器 -->
  <div id="dialogContainer"></div>
  
  <!-- 通用加载屏蔽层（创建/加入房间） -->
  <div id="loadingOverlay" style="display:none;">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">加载中...</div>
    <div class="loading-progress">请稍候</div>
  </div>
  
  <!-- 数子加载屏蔽层 -->
  <div id="countingOverlay" style="display:none;">
    <div class="loading-spinner"></div>
    <div class="loading-text">数子分析中...</div>
    <div class="loading-progress">请稍候</div>
  </div>
  
  <script type="module" src="./hh.ts"></script>
</body>
</html>
